<!doctype html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ADMS Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111821;
      --card: #0d131b;
      --line: rgba(255, 255, 255, 0.12);
      --text: #d7e2ee;
      --muted: #8394a8;
      --blue: #16c7f3;
      --red: #ff5c6c;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(22, 199, 243, 0.12), transparent 34%), var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .login-card {
      width: min(440px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
    }

    .brand {
      margin-bottom: 22px;
    }

    .brand-title {
      color: #f5f9ff;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .brand-subtitle,
    .zh-sub {
      color: var(--muted);
    }

    .form-control {
      min-height: 44px;
      color: var(--text);
      background: var(--card);
      border-color: var(--line);
    }

    .form-control:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 0.2rem rgba(22, 199, 243, 0.16);
    }

    .btn-primary {
      --bs-btn-bg: var(--blue);
      --bs-btn-border-color: var(--blue);
      --bs-btn-color: #04111a;
      --bs-btn-hover-bg: #3bd7ff;
      --bs-btn-hover-border-color: #3bd7ff;
      font-weight: 900;
    }

    .alert {
      border-color: rgba(255, 92, 108, 0.35);
      color: #ff9aa5;
      background: rgba(255, 92, 108, 0.1);
    }

    a {
      color: var(--blue);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <div class="brand">
      <div class="brand-title">ADMS Admin Login</div>
      <div class="brand-subtitle">Management pages require the administrator password. <span class="zh-sub">/ 管理页面需要管理员密码。</span></div>
    </div>

    {% if error %}
    <div class="alert py-2">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" autocomplete="off">
      <input type="hidden" name="next" value="{{ next_url }}">
      <label class="form-label fw-bold" for="password">Admin Password <span class="zh-sub">/ 管理员密码</span></label>
      <input id="password" class="form-control mb-3" name="password" type="password" autofocus required>
      <button class="btn btn-primary w-100 py-2" type="submit">Login <span class="zh-sub">/ 登录</span></button>
    </form>

    <div class="mt-3 small">
      <a href="/settings/help">Open Help Center without login <span class="zh-sub">/ 无需登录打开帮助中心</span></a>
    </div>
  </main>
</body>
</html>
