<!doctype html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eastman ADMS Server Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --font-base: 14px;
      --font-small: 12px;
      --font-label: 11px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --panel-gap: 12px;
      --panel-padding: 14px;
      --card-padding: 10px;
      --radius: 8px;
      --bg: #0b0f14;
      --panel: #111821;
      --card: #0d131b;
      --line: rgba(255, 255, 255, 0.1);
      --line-soft: rgba(255, 255, 255, 0.07);
      --text: #d7e2ee;
      --muted: #8394a8;
      --blue: #8fb3d9;
      --green: #24d685;
      --yellow: #ffc107;
      --red: #ff4d4f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: var(--font-base);
      line-height: 1.4;
    }

    .console-shell {
      max-width: 1920px;
      padding: 16px 28px 20px;
    }

    .topbar {
      min-height: 68px;
      display: grid;
      grid-template-columns: minmax(260px, auto) minmax(0, 1fr) auto;
      gap: var(--space-md);
      align-items: center;
      margin-bottom: var(--panel-gap);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .top-title {
      font-size: 21px;
      line-height: 1.15;
      font-weight: 800;
      color: #f2f7ff;
    }

    .top-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: var(--font-label);
    }

    .status-summary {
      min-width: 0;
      color: #f2f7ff;
      font-size: 13px;
      font-weight: 700;
    }

    .summary-line {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      justify-content: flex-end;
    }

    .summary-item {
      overflow-wrap: anywhere;
    }

    .summary-sep {
      color: #47596c;
    }

    .btn-console {
      min-height: 31px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: var(--font-small);
      white-space: nowrap;
    }

    .layout-grid {
      --bs-gutter-x: var(--panel-gap);
      --bs-gutter-y: var(--panel-gap);
    }

    .panel {
      min-height: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(143, 179, 217, 0.02);
    }

    .panel-header {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      padding: 8px var(--panel-padding);
      border-bottom: 1px solid var(--line-soft);
      color: var(--blue);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .panel-body {
      padding: var(--panel-padding);
    }

    .metric {
      min-width: 0;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-radius: var(--radius);
      padding: var(--card-padding);
    }

    .metric-label,
    .state-label,
    .field-label {
      color: var(--muted);
      font-size: var(--font-label);
      line-height: 1.25;
    }

    .metric-value,
    .state-value,
    .field-value {
      color: #f2f7ff;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .state-board {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-sm);
    }

    .state-item {
      min-width: 0;
      padding: 9px 10px;
      background: var(--card);
      border: 1px solid rgba(143, 179, 217, 0.18);
      border-radius: var(--radius);
    }

    .state-value {
      margin-top: 3px;
      font-size: 15px;
    }

    .device-grid {
      --bs-gutter-x: var(--space-sm);
      --bs-gutter-y: var(--space-sm);
    }

    .device-card {
      height: 100%;
      min-width: 0;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-radius: var(--radius);
      padding: 11px;
    }

    .device-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }

    .device-sn {
      color: #f2f7ff;
      font-size: 13px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .status-pill {
      flex: 0 0 auto;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
      white-space: nowrap;
    }

    .field-grid {
      display: grid;
      grid-template-columns: minmax(118px, 0.85fr) minmax(0, 1fr);
      gap: 5px 8px;
      align-items: baseline;
    }

    .field-value {
      text-align: right;
      font-size: 12.5px;
    }

    .device-secondary {
      margin-top: var(--space-sm);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--line-soft);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-sm);
    }

    .server-time {
      margin-top: var(--space-sm);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--line-soft);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-sm);
    }

    .stat-value {
      margin-top: 2px;
      color: #f2f7ff;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 900;
    }

    .latest-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-radius: var(--radius);
      padding: var(--card-padding);
    }

    .latest-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-sm);
    }

    .event-log {
      max-height: 410px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .event-item {
      margin-bottom: 7px;
      padding: 7px 9px;
      background: var(--card);
      border-left: 3px solid #335a86;
      border-radius: 0 6px 6px 0;
    }

    .event-line {
      display: grid;
      grid-template-columns: 58px minmax(150px, 0.8fr) minmax(160px, 1fr) minmax(130px, 0.8fr);
      gap: var(--space-sm);
      align-items: baseline;
    }

    .event-title {
      color: #f2f7ff;
      font-size: 13px;
      font-weight: 900;
    }

    .event-details {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 3px 12px;
      margin-top: 4px;
      font-size: var(--font-small);
    }

    .muted {
      color: var(--muted);
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      margin-right: 6px;
      vertical-align: 1px;
    }

    .dot-online { background: var(--green); }
    .dot-warning { background: var(--yellow); }
    .dot-offline { background: var(--red); }

    .mono {
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 1199.98px) {
      .console-shell {
        padding: 14px 20px 18px;
      }

      .topbar {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .status-summary {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .top-actions {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
      }

      .summary-line {
        justify-content: flex-start;
      }

      .state-board {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .latest-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 767.98px) {
      .console-shell {
        padding: 10px 12px 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
        min-height: auto;
        padding: 10px 12px;
      }

      .status-summary {
        grid-column: auto;
        grid-row: auto;
      }

      .top-title {
        font-size: 20px;
      }

      .top-actions {
        grid-column: auto;
        grid-row: auto;
        justify-self: stretch;
      }

      .btn-console {
        width: 100%;
      }

      .state-board,
      .status-grid,
      .stats-grid,
      .latest-grid {
        grid-template-columns: 1fr;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .field-value {
        text-align: left;
      }

      .event-line,
      .event-details {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container-fluid console-shell">
    <section class="topbar">
      <div>
        <h1 class="top-title mb-0">ADMS Server Console / ADMS 服务器控制台</h1>
        <div class="top-subtitle">State-first development console / 状态优先开发控制台 · Auto refresh every 2 seconds / 每 2 秒自动刷新</div>
      </div>
      <div id="headline" class="status-summary"></div>
      <div class="top-actions">
        <button id="refreshBtn" type="button" class="btn btn-outline-info btn-console">Refresh / 刷新</button>
      </div>
    </section>

    <div class="row layout-grid">
      <section class="col-12">
        <div class="panel">
          <div class="panel-header">① Current State / 当前状态</div>
          <div class="panel-body">
            <div id="primaryStatus"></div>
          </div>
        </div>
      </section>

      <section class="col-12">
        <div class="panel">
          <div class="panel-header">② Device Status / 设备状态</div>
          <div class="panel-body">
            <div id="deviceStatus" class="row device-grid"></div>
          </div>
        </div>
      </section>

      <section class="col-12 col-xl-5">
        <div class="panel">
          <div class="panel-header">③ Server Status / 服务器状态</div>
          <div class="panel-body">
            <div id="serverStatus"></div>
          </div>
        </div>
      </section>

      <section class="col-12 col-xl-7">
        <div class="panel">
          <div class="panel-header">④ Statistics / 今日统计</div>
          <div class="panel-body">
            <div id="statistics"></div>
          </div>
        </div>
      </section>

      <section class="col-12">
        <div class="panel">
          <div class="panel-header">⑤ Latest Activity / 最近活动</div>
          <div class="panel-body" id="latestActivity"></div>
        </div>
      </section>

      <section class="col-12">
        <div class="panel">
          <div class="panel-header">
            <span>⑥ Realtime Event Log / 实时事件日志</span>
            <button id="clearBtn" type="button" class="btn btn-sm btn-outline-secondary btn-console">Clear Event Log / 清空页面日志</button>
          </div>
          <div class="panel-body">
            <div id="eventLog" class="event-log"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    let eventLogCleared = false;

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, function (char) {
        return ({'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'})[char];
      });
    }

    function statusDot(status) {
      const normalized = String(status || '').toLowerCase();
      if (normalized === 'online' || normalized === 'running' || normalized === 'connected' || normalized === 'normal') {
        return '<span class="dot dot-online"></span>';
      }
      if (normalized === 'warning') {
        return '<span class="dot dot-warning"></span>';
      }
      return '<span class="dot dot-offline"></span>';
    }

    const statusText = {
      ONLINE: 'ONLINE / 在线',
      OFFLINE: 'OFFLINE / 离线',
      WARNING: 'WARNING / 警告',
      Running: 'Running / 运行中',
      Connected: 'Connected / 已连接',
      Normal: 'Normal / 正常',
    };

    const labelText = {
      Server: 'Server / 服务器',
      Device: 'Device / 设备',
      'Last Seen': 'Last Seen / 最近通信',
      'Last Heartbeat': 'Last Heartbeat / 最后心跳',
      'Last Data Upload': 'Last Data Upload / 最后数据上传',
      'Last Raw Request': 'Last Raw Request / 最后请求编号',
      'Last Raw Request ID': 'Last Raw Request ID / 最后请求编号',
      'Last Request': 'Last Request / 最后请求类型',
      Database: 'Database / 数据库',
      API: 'API / 接口状态',
      'Server Time': 'Server Time / 服务器时间',
      'Device SN': 'Device SN / 设备序列号',
      'Last ATTLOG': 'Last ATTLOG / 最后考勤上传',
      'Last OPERLOG': 'Last OPERLOG / 最后操作日志',
      'Last USER Sync': 'Last USER Sync / 最后用户同步',
      'Client IP': 'Client IP / 客户端 IP',
      'Push Version': 'Push Version / Push 协议版本',
      Heartbeat: 'Heartbeat / 心跳',
      ATTLOG: 'ATTLOG / 考勤上传',
      OPERLOG: 'OPERLOG / 操作日志',
      USER: 'USER / 用户同步',
      'Latest Attendance': 'Latest Attendance / 最近考勤',
      'Employee PIN': 'Employee PIN / 员工编号',
      'Attendance Time': 'Attendance Time / 考勤时间',
      'Receive Time': 'Receive Time / 接收时间',
      Status: 'Status / 状态',
      PIN: 'PIN / 员工编号',
      'User Name': 'User Name / 用户姓名',
      'Attendance ID': 'Attendance ID / 考勤记录编号',
      'Raw Request ID': 'Raw Request ID / 原始请求编号',
      'Operation ID': 'Operation ID / 操作记录编号',
      Operation: 'Operation / 操作',
      Body: 'Body / 请求内容',
      Module: 'Module / 模块',
      Reason: 'Reason / 原因',
    };

    const eventText = {
      HANDSHAKE: 'HANDSHAKE / 初始化握手',
      HEARTBEAT: 'HEARTBEAT / 心跳',
      'ATTLOG RECEIVED': 'ATTLOG RECEIVED / 收到考勤数据',
      'ATTLOG SAVED': 'ATTLOG SAVED / 考勤数据已保存',
      'OPERLOG RECEIVED': 'OPERLOG RECEIVED / 收到操作日志',
      'OPERLOG SAVED': 'OPERLOG SAVED / 操作日志已保存',
      'USER RECEIVED': 'USER RECEIVED / 收到用户数据',
      'USER SAVED': 'USER SAVED / 用户数据已保存',
      ERROR: 'ERROR / 错误',
    };

    const requestTypeText = {
      GETREQUEST: 'GETREQUEST / 心跳请求',
      HANDSHAKE: 'HANDSHAKE / 初始化握手',
      ATTLOG: 'ATTLOG / 考勤上传',
      OPERLOG: 'OPERLOG / 操作日志',
      USER: 'USER / 用户上传',
      DEVICECMD: 'DEVICECMD / 设备命令回执',
      CDATA: 'CDATA / 设备数据',
      UNKNOWN: 'UNKNOWN / 未知请求',
      '-': '-',
    };

    function labelFor(value) {
      return labelText[value] || value;
    }

    function displayStatus(value) {
      return statusText[value] || value;
    }

    function displayRequestType(value) {
      return requestTypeText[value] || value;
    }

    function displayEventType(value) {
      return eventText[value] || value;
    }

    function displayValue(labelName, value) {
      if (labelName === 'Device' || labelName === 'Server' || labelName === 'Database' || labelName === 'API' || labelName === 'Status') {
        return displayStatus(value);
      }
      if (labelName === 'Last Request') {
        return displayRequestType(value);
      }
      return value;
    }

    function renderHeadline(headline) {
      const element = document.getElementById('headline');
      element.innerHTML = `
        <div class="summary-line">
          <span class="summary-item">${statusDot('Running')}Server / 服务器 ${esc(displayStatus('Running'))}</span>
          <span class="summary-sep">·</span>
          <span class="summary-item">${statusDot(headline.status)}Device / 设备 ${esc(displayStatus(headline.status))}</span>
          <span class="summary-sep">·</span>
          <span class="summary-item">Last Seen / 最近通信 <span class="mono">${esc(headline.last_seen)}</span></span>
          <span class="summary-sep">·</span>
          <span class="summary-item">/console</span>
        </div>
      `;
    }

    function renderPrimaryStatus(data) {
      const summary = data.summary || {};
      const rows = [
        ['Server', summary.server || '-'],
        ['Device', summary.device || '-'],
        ['Last Seen', summary.last_seen || '-'],
        ['Last Heartbeat', summary.last_heartbeat || '-'],
        ['Last Data Upload', summary.last_data_upload || '-'],
        ['Last Raw Request', summary.last_raw_request || '-'],
        ['Last Request', summary.last_request || '-'],
      ];
      document.getElementById('primaryStatus').innerHTML = `
        <div class="state-board">
          ${rows.map(([labelName, value]) => `
            <div class="state-item">
              <div class="state-label">${esc(labelFor(labelName))}</div>
              <div class="state-value mono">${labelName === 'Device' || labelName === 'Server' ? statusDot(value) : ''}${esc(displayValue(labelName, value))}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderServer(server) {
      const statusItems = [
        ['Server', server.server],
        ['Database', server.database],
        ['API', server.api],
      ];
      document.getElementById('serverStatus').innerHTML = `
        <div class="status-grid">
          ${statusItems.map(([labelName, value]) => `
            <div class="metric">
              <div class="metric-label">${esc(labelFor(labelName))}</div>
              <div class="metric-value">${statusDot(value)}${esc(displayValue(labelName, value))}</div>
            </div>
          `).join('')}
        </div>
        <div class="server-time">
          <div class="metric-label">${esc(labelFor('Server Time'))}</div>
          <div class="metric-value mono">${esc(server.server_time)}</div>
        </div>
      `;
    }

    function renderDevices(devices) {
      const container = document.getElementById('deviceStatus');
      if (!devices.length) {
        container.innerHTML = '<div class="col-12 muted">No device has connected yet. / 暂无设备连接记录。</div>';
        return;
      }
      container.innerHTML = devices.map(device => `
        <div class="col-12 col-md-6 col-xl-4">
          <div class="device-card">
            <div class="device-head">
              <div class="min-w-0">
                <div class="metric-label">${esc(labelFor('Device SN'))}</div>
                <div class="device-sn mono">${esc(device.device_sn)}</div>
              </div>
              <div class="status-pill">${statusDot(device.status)}${esc(displayStatus(device.status))}</div>
            </div>
            <div class="field-grid">
              <div class="field-label">${esc(labelFor('Last Seen'))}</div><div class="field-value mono">${esc(device.last_seen)}</div>
              <div class="field-label">${esc(labelFor('Last Request'))}</div><div class="field-value mono">${esc(displayRequestType(device.last_request))}</div>
              <div class="field-label">${esc(labelFor('Client IP'))}</div><div class="field-value mono">${esc(device.client_ip)}</div>
              <div class="field-label">${esc(labelFor('Push Version'))}</div><div class="field-value mono">${esc(device.push_version)}</div>
              <div class="field-label">${esc(labelFor('Last Heartbeat'))}</div><div class="field-value mono">${esc(device.last_heartbeat)}</div>
              <div class="field-label">${esc(labelFor('Last Data Upload'))}</div><div class="field-value mono">${esc(device.last_data_upload)}</div>
              <div class="field-label">${esc(labelFor('Last Raw Request ID'))}</div><div class="field-value mono">${esc(device.last_raw_request_id)}</div>
            </div>
            <div class="device-secondary field-grid">
              <div class="field-label">${esc(labelFor('Last ATTLOG'))}</div><div class="field-value mono">${esc(device.last_attlog)}</div>
              <div class="field-label">${esc(labelFor('Last OPERLOG'))}</div><div class="field-value mono">${esc(device.last_operlog)}</div>
              <div class="field-label">${esc(labelFor('Last USER Sync'))}</div><div class="field-value mono">${esc(device.last_user)}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function renderEvents(events) {
      const container = document.getElementById('eventLog');
      if (eventLogCleared) {
        container.innerHTML = '<div class="muted">Event log cleared in browser cache. Refresh will load events again. / 页面日志已清空，点击刷新会重新加载事件。</div>';
        return;
      }
      if (!events.length) {
        container.innerHTML = '<div class="muted">No ADMS events yet. / 暂无 ADMS 事件。</div>';
        return;
      }
      container.innerHTML = events.map(event => {
        const details = Object.entries(event.details || {});
        if (event.type === 'HEARTBEAT') {
          const clientIp = (event.details || {})['Client IP'] || '-';
          return `
            <div class="event-item">
              <div class="event-line">
                <div class="muted mono">${esc(event.time)}</div>
                <div class="event-title">${esc(displayEventType(event.type))}</div>
                <div class="mono">Device / 设备: ${esc(event.device_sn)}</div>
                <div class="mono">Client IP / 客户端 IP: ${esc(clientIp)}</div>
              </div>
            </div>
          `;
        }
        const detailsHtml = details.map(([key, value]) => `
          <div><span class="muted">${esc(labelFor(key))}:</span> <span class="mono">${esc(value)}</span></div>
        `).join('');
        return `
          <div class="event-item">
            <div class="d-flex justify-content-between gap-2">
              <div class="event-title">${esc(displayEventType(event.type))}</div>
              <div class="muted mono">${esc(event.time)}</div>
            </div>
            <div class="event-details">
              <div class="mono"><span class="muted">Device / 设备:</span> ${esc(event.device_sn)}</div>
              ${detailsHtml}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderStatistics(statistics) {
      const items = [
        ['Heartbeat', statistics.heartbeat],
        ['ATTLOG', statistics.attlog],
        ['OPERLOG', statistics.operlog],
        ['USER', statistics.user],
      ];
      document.getElementById('statistics').innerHTML = `
        <div class="stats-grid">
          ${items.map(([labelName, value]) => `
            <div class="metric">
              <div class="metric-label">${esc(labelFor(labelName))}</div>
              <div class="stat-value mono">${esc(value)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderLatestActivity(latestActivity) {
      const latest = latestActivity.latest_attendance;
      if (!latest) {
        document.getElementById('latestActivity').innerHTML = '<div class="muted">No attendance event yet. / 暂无考勤记录。</div>';
        return;
      }
      const items = [
        ['Employee PIN', latest.pin],
        ['Attendance Time', latest.attendance_time],
        ['Receive Time', latest.receive_time],
        ['Status', latest.status],
      ];
      document.getElementById('latestActivity').innerHTML = `
        <div class="latest-card">
          <div class="metric-label mb-2">${esc(labelFor('Latest Attendance'))}</div>
          <div class="latest-grid">
            ${items.map(([labelName, value]) => `
              <div>
                <div class="field-label">${esc(labelFor(labelName))}</div>
                <div class="field-value mono text-start">${esc(displayValue(labelName, value))}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    async function refreshConsole() {
      const response = await fetch('/console?format=json', { cache: 'no-store' });
      const data = await response.json();
      renderHeadline(data.headline);
      renderPrimaryStatus(data);
      renderServer(data.server);
      renderDevices(data.devices);
      renderEvents(data.events);
      renderStatistics(data.statistics);
      renderLatestActivity(data.latest_activity);
    }

    document.getElementById('refreshBtn').addEventListener('click', function () {
      eventLogCleared = false;
      refreshConsole();
    });
    document.getElementById('clearBtn').addEventListener('click', function () {
      eventLogCleared = true;
      renderEvents([]);
    });

    refreshConsole();
    setInterval(refreshConsole, 2000);
  </script>
</body>
</html>
