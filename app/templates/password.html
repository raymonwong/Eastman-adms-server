<!doctype html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Password - ADMS Console</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111821;
      --card: #0d131b;
      --line: rgba(255, 255, 255, 0.12);
      --text: #d7e2ee;
      --muted: #8394a8;
      --blue: #16c7f3;
      --green: #24d685;
      --red: #ff5c6c;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .page {
      width: min(760px, calc(100vw - 32px));
      margin: 48px auto;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel-header,
    .panel-body {
      padding: 20px 24px;
    }

    .panel-header {
      border-bottom: 1px solid var(--line);
    }

    .page-title {
      margin: 0;
      color: #f5f9ff;
      font-size: 24px;
      font-weight: 900;
    }

    .muted,
    .zh-sub {
      color: var(--muted);
    }

    .form-control {
      min-height: 42px;
      color: var(--text);
      background: var(--card);
      border-color: var(--line);
    }

    .form-control:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 0.2rem rgba(22, 199, 243, 0.16);
    }

    .btn-info {
      --bs-btn-bg: var(--blue);
      --bs-btn-border-color: var(--blue);
      --bs-btn-color: #04111a;
      font-weight: 900;
    }

    .btn-outline-light {
      --bs-btn-border-color: rgba(255, 255, 255, 0.28);
      --bs-btn-color: var(--text);
    }

    .alert-danger {
      border-color: rgba(255, 92, 108, 0.35);
      color: #ff9aa5;
      background: rgba(255, 92, 108, 0.1);
    }

    .alert-success {
      border-color: rgba(36, 214, 133, 0.35);
      color: var(--green);
      background: rgba(36, 214, 133, 0.1);
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-actions">
      <a class="btn btn-outline-light btn-sm" href="/console">Back to Console <span class="zh-sub">/ 返回控制台</span></a>
      <form method="post" action="/logout">
        <button class="btn btn-outline-light btn-sm" type="submit">Logout <span class="zh-sub">/ 退出登录</span></button>
      </form>
    </div>

    <section class="panel">
      <div class="panel-header">
        <h1 class="page-title">Admin Password <span class="zh-sub">/ 管理员密码</span></h1>
        <div class="muted mt-1">Change the single administrator password used by ADMS management pages. <span class="zh-sub">/ 修改 ADMS 管理网页使用的唯一管理员密码。</span></div>
      </div>
      <div class="panel-body">
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success py-2">{{ success }}</div>
        {% endif %}

        <form method="post" action="/settings/password" autocomplete="off">
          <div class="mb-3">
            <label class="form-label fw-bold" for="current_password">Current Password <span class="zh-sub">/ 当前密码</span></label>
            <input id="current_password" class="form-control" name="current_password" type="password" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold" for="new_password">New Password <span class="zh-sub">/ 新密码</span></label>
            <input id="new_password" class="form-control" name="new_password" type="password" minlength="8" required>
            <div class="form-text muted">At least 8 characters. <span class="zh-sub">/ 至少 8 位。</span></div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold" for="confirm_password">Confirm New Password <span class="zh-sub">/ 确认新密码</span></label>
            <input id="confirm_password" class="form-control" name="confirm_password" type="password" minlength="8" required>
          </div>
          <button class="btn btn-info px-4" type="submit">Save Password <span class="zh-sub">/ 保存密码</span></button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
