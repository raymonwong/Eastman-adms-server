services:
  mysql:
    image: mysql:8.0
    command: ["--default-authentication-plugin=mysql_native_password"]
    container_name: eastman-adms-mysql
    env_file:
      - .env
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${MYSQL_PORT}:3306"
    volumes:
      - eastman-adms-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: .
    image: eastman-adms-server:dt001
    container_name: eastman-adms-api
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - eastman-adms-logs:/app/logs
      - eastman-adms-backup:/app/backup
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

volumes:
  eastman-adms-mysql:
    name: eastman-adms-mysql
  eastman-adms-logs:
    name: eastman-adms-logs
  eastman-adms-backup:
    name: eastman-adms-backup
